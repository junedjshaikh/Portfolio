<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume | Juned Javed Shaikh</title>

<style>
body{
  margin:0;
  background:#050a0f;
  color:white;
  font-family:Arial,sans-serif;
}

.resume-container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.btn{
  padding:12px 20px;
  text-decoration:none;
  border:1px solid #00ffe0;
  color:#00ffe0;
  transition:.3s;
}

.btn:hover{
  background:#00ffe0;
  color:black;
}

.resume-viewer{
  width:100%;
  height:100vh;
  border:none;
  border-radius:10px;
}

.resume-viewer{
  width:100%;
  max-width:850px;
  height:1100px;
  display:block;
  margin:auto;
  background:white;
}

.btn{
  padding: 14px 24px;
  background: transparent;
  border: 1px solid rgba(0,255,224,0.35);
  color: #00ffe0;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 2px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.25s ease;
  border-radius: 8px;
}

.btn:hover{
  border-color: #00ffe0;
  box-shadow: 0 0 18px rgba(0,255,224,0.25);
  transform: translateY(-2px);
}

.btn:active{
  transform: translateY(0);
}

.btn:focus{
  outline: none;
  box-shadow: 0 0 0 2px rgba(0,255,224,0.15);
}
</style>
</head>
<body>

<div class="resume-container">

  <div class="top-bar">
    <a href="portfolio.html" class="btn">← BACK</a>

    <button class="btn" onclick="downloadResume()">
  DOWNLOAD RESUME
    </button>
  </div>

  <embed 
  src="Juned_resume.pdf" 
  type="application/pdf" 
  class="resume-viewer">

</div>

<script>
function downloadResume() {
  const link = document.createElement('a');
  link.href = 'resume.pdf';
  link.download = 'Juned_resume.pdf';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>

</body>
</html>
